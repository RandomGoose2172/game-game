<!DOCTYPE html>
<html>
<head>
  <title>Visible Sword + Trees</title>
  <style>
    body { margin:0; overflow:hidden; background:black; }

    #ui {
      position:absolute;
      top:10px; left:10px;
      color:white;
      font-family:Arial;
    }

    .bar {
      width:200px; height:20px;
      background:#333; margin-bottom:5px;
    }

    .fill { height:100%; background:lime; }
    #enemyBar .fill { background:red; }
    #stamBar .fill { background:cyan; }

    #msg {
      position:absolute;
      top:40%; width:100%;
      text-align:center;
      font-size:40px;
      color:white;
      display:none;
    }
  </style>
</head>
<body>

<div id="ui">
  HP
  <div class="bar"><div id="hp" class="fill"></div></div>

  STAMINA
  <div class="bar"><div id="stam" class="fill"></div></div>

  BOSS
  <div class="bar"><div id="ehp" class="fill"></div></div>
</div>

<div id="msg"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let player, enemy, sword;

let keys = {};
let attacking = false;
let attackTimer = 0;

let stamina = 5;
let maxStamina = 5;

let dodge = false;
let dodgeTimer = 0;
let dodgeCooldown = 0;

let hp = 5;
let ehp = 10;

let bossTimer = 0;
let dead = false;

// 🧍 character
function human(color){
  let g = new THREE.Group();
  let m = new THREE.MeshStandardMaterial({color});

  let body = new THREE.Mesh(new THREE.BoxGeometry(0.8,1.5,0.4), m);
  body.position.y = 1.2;
  g.add(body);

  let head = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.6,0.6), m);
  head.position.y = 2.2;
  g.add(head);

  let leg1 = new THREE.Mesh(new THREE.BoxGeometry(0.3,1,0.3), m);
  leg1.position.set(-0.2,0.5,0);
  g.add(leg1);

  let leg2 = new THREE.Mesh(new THREE.BoxGeometry(0.3,1,0.3), m);
  leg2.position.set(0.2,0.5,0);
  g.add(leg2);

  let arm = new THREE.Mesh(new THREE.BoxGeometry(0.2,1,0.2), m);
  arm.position.set(0.6,1.6,0);
  g.add(arm);

  return g;
}

// 🌳 tree
function tree(x,z){
  let t = new THREE.Group();

  let trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.3,0.3,3),
    new THREE.MeshStandardMaterial({color:0x8B4513})
  );
  trunk.position.y = 1.5;
  t.add(trunk);

  let leaves = new THREE.Mesh(
    new THREE.SphereGeometry(1.5),
    new THREE.MeshStandardMaterial({color:0x2ecc71})
  );
  leaves.position.y = 3.5;
  t.add(leaves);

  t.position.set(x,0,z);
  scene.add(t);
}

function init(){
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

  renderer = new THREE.WebGLRenderer();
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);

  let light = new THREE.DirectionalLight(0xffffff,1.2);
  light.position.set(5,10,7);
  scene.add(light);

  // 🌱 brighter ground
  let ground = new THREE.Mesh(
    new THREE.PlaneGeometry(60,60),
    new THREE.MeshStandardMaterial({color:0x2ecc71})
  );
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);

  // 🌳 LOTS of trees
  for(let i=0;i<40;i++){
    let x=(Math.random()-0.5)*50;
    let z=(Math.random()-0.5)*50;
    if(Math.abs(x)<6 && Math.abs(z)<6) continue;
    tree(x,z);
  }

  player = human(0x00ff00);
  enemy = human(0xff0000);
  enemy.position.set(5,0,0);

  scene.add(player);
  scene.add(enemy);

  // ⚔️ BIG OBVIOUS SWORD
  let blade = new THREE.Mesh(
    new THREE.BoxGeometry(0.3,2.5,0.3), // MUCH BIGGER
    new THREE.MeshStandardMaterial({
      color:0xffff00,   // BRIGHT YELLOW
      emissive:0xffff00,
      emissiveIntensity:0.8
    })
  );
  blade.position.y = 1.2;

  sword = new THREE.Group();
  sword.add(blade);

  sword.position.set(1,1.5,0);
  player.add(sword);

  document.addEventListener("keydown", e=>{
    keys[e.key.toLowerCase()] = true;

    if(e.code==="Space" && !attacking && stamina >= 1 && !dead){
      attacking = true;
      attackTimer = 0;
      stamina -= 1;
    }

    if(e.key==="q" && stamina >= 2 && dodgeCooldown <= 0 && !dead){
      dodge = true;
      dodgeTimer = 0;
      dodgeCooldown = 60;
      stamina -= 2;
    }

    if(e.key==="r" && dead) location.reload();
  });

  document.addEventListener("keyup", e=>{
    keys[e.key.toLowerCase()] = false;
  });

  animate();
}

function ui(){
  document.getElementById("hp").style.width = (hp/5*100)+"%";
  document.getElementById("ehp").style.width = (ehp/10*100)+"%";
  document.getElementById("stam").style.width = (stamina/maxStamina*100)+"%";
}

function show(t){
  let m = document.getElementById("msg");
  m.innerText = t + " (R)";
  m.style.display = "block";
  dead = true;
}

function animate(){
  requestAnimationFrame(animate);

  let speed = 0.1;
  let moveDir = new THREE.Vector3();

  if(!dead){
    if(keys["w"]) moveDir.z -= 1;
    if(keys["s"]) moveDir.z += 1;
    if(keys["a"]) moveDir.x -= 1;
    if(keys["d"]) moveDir.x += 1;
  }

  if(moveDir.length()>0){
    moveDir.normalize();
    player.position.add(moveDir.multiplyScalar(speed));
  }

  dodgeCooldown--;
  if(dodge){
    dodgeTimer++;

    let d = moveDir.clone();
    if(d.length()===0) d.z = 1;

    d.normalize();
    player.position.add(d.multiplyScalar(0.4));

    if(dodgeTimer > 20) dodge = false;
  }

  // camera
  let mid = new THREE.Vector3().addVectors(player.position, enemy.position).multiplyScalar(0.5);
  camera.position.lerp(new THREE.Vector3(mid.x,5,mid.z+12),0.1);
  camera.lookAt(mid);

  let dist = player.position.distanceTo(enemy.position);
  let dir = new THREE.Vector3().subVectors(player.position, enemy.position).normalize();

  if(!dead && dist > 2){
    enemy.position.add(dir.multiplyScalar(0.04));
  }

  bossTimer--;
  if(!dead && dist < 2 && bossTimer <= 0){
    if(!dodge || dodgeTimer > 10){
      hp--;
    }
    bossTimer = 40;
  }

  // ⚔️ BIG SWING
  if(attacking){
    attackTimer++;

    sword.rotation.z = -Math.PI/2 + (attackTimer/20)*Math.PI * 1.5;

    if(attackTimer === 10){
      if(dist < 2){
        ehp--;
        enemy.position.add(dir.multiplyScalar(1));
      }
    }

    if(attackTimer > 20){
      attacking = false;
      sword.rotation.z = 0;
    }
  }

  if(!attacking && !dodge){
    stamina = Math.min(maxStamina, stamina + 0.02);
  }

  ui();

  if(ehp <= 0 && !dead) show("YOU WIN");
  if(hp <= 0 && !dead) show("GAME OVER");

  renderer.render(scene,camera);
}

init();
</script>
</body>
</html>
