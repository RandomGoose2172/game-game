<!DOCTYPE html>
<html>
<head>
  <title>Ultimate Boss Fight</title>
  <style>
    body { margin:0; overflow:hidden; background:black; }
    #ui { position:absolute; top:10px; left:10px; color:white; font-family:Arial; z-index:10; }
    .bar { width:200px; height:20px; background:#333; margin-bottom:5px; }
    .fill { height:100%; background:lime; }
    #boss .fill { background:red; }
    #stam .fill { background:cyan; }
    #msg { position:absolute; top:40%; width:100%; text-align:center; font-size:40px; color:white; display:none; }
  </style>
</head>
<body>

<div id="ui">
  HP <div class="bar"><div id="hp" class="fill"></div></div>
  STAMINA <div class="bar"><div id="stam" class="fill"></div></div>
  BOSS <div class="bar"><div id="boss" class="fill"></div></div>
</div>

<div id="msg"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let player, enemy, sword;

let bullets = [];
let keys = {};

let attacking=false, attackT=0, hitDone=false;

let stamina=5, maxStamina=5;
let hp=5, bossHP=10;

let dodge=false, dodgeT=0, dodgeCD=0;

let gunCooldown=0, gunHeat=0, gunTimer=0;

let bossPhase=1, bossArms=[];
let bossTimer=0, shockTimer=0;

let dashState=0, dashTimer=0, dashDir=new THREE.Vector3(), dashCooldown=0;

let shake=0, dead=false;

let bossMaterial;

// 📳 shake
function applyShake(){
  if(shake>0){
    camera.position.x+=(Math.random()-0.5)*shake;
    camera.position.y+=(Math.random()-0.5)*shake;
    shake*=0.9;
  }
}

// ✨ spark
function spark(pos){
  let s=new THREE.Mesh(
    new THREE.SphereGeometry(0.1),
    new THREE.MeshBasicMaterial({color:0xffff00})
  );
  s.position.copy(pos);
  scene.add(s);
  setTimeout(()=>scene.remove(s),100);
}

// 🧍 character
function human(color){
  let g=new THREE.Group();

  let bodyMat=new THREE.MeshStandardMaterial({color});
  let limbMat=new THREE.MeshStandardMaterial({color:0x222222});

  let body=new THREE.Mesh(new THREE.BoxGeometry(0.8,1.5,0.4),bodyMat);
  body.position.y=1.2; g.add(body);

  let head=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.6,0.6),bodyMat);
  head.position.y=2.2; g.add(head);

  let leg1=new THREE.Mesh(new THREE.BoxGeometry(0.3,1,0.3),limbMat);
  leg1.position.set(-0.2,0.5,0); g.add(leg1);

  let leg2=new THREE.Mesh(new THREE.BoxGeometry(0.3,1,0.3),limbMat);
  leg2.position.set(0.2,0.5,0); g.add(leg2);

  let armL=new THREE.Mesh(new THREE.BoxGeometry(0.25,1,0.25),limbMat);
  armL.position.set(-0.6,1.6,0); g.add(armL);

  let armR=new THREE.Mesh(new THREE.BoxGeometry(0.25,1,0.25),limbMat);
  armR.position.set(0.6,1.6,0); g.add(armR);

  g.userData.material = bodyMat;
  return g;
}

// 🌳 tree
function tree(x,z){
  let t=new THREE.Group();

  let trunk=new THREE.Mesh(
    new THREE.CylinderGeometry(0.3,0.3,2),
    new THREE.MeshStandardMaterial({color:0x8B4513})
  );
  trunk.position.y=1;
  t.add(trunk);

  let leaves=new THREE.Mesh(
    new THREE.SphereGeometry(1.3),
    new THREE.MeshStandardMaterial({color:0x2ecc71})
  );
  leaves.position.y=2.5;
  t.add(leaves);

  t.position.set(x,0,z);
  scene.add(t);
}

// 🔫 shoot
function shoot(){
  let b=new THREE.Mesh(
    new THREE.SphereGeometry(0.1),
    new THREE.MeshBasicMaterial({color:0xff0000})
  );

  b.position.copy(player.position);
  b.position.y+=1.2;

  let dir=new THREE.Vector3().subVectors(enemy.position,player.position).normalize();

  b.userData={dir};
  bullets.push(b);
  scene.add(b);
}

// 👹 phase 2
function upgradeBoss(){
  bossPhase=2;

  for(let i=0;i<4;i++){
    let arm=new THREE.Mesh(
      new THREE.BoxGeometry(0.25,1.2,0.25),
      new THREE.MeshStandardMaterial({color:0xaa0000})
    );

    let a=(i/4)*Math.PI*2;
    arm.position.set(Math.cos(a)*1.2,1.5,Math.sin(a)*1.2);

    enemy.add(arm);
    bossArms.push(arm);
  }
}

function init(){
  scene=new THREE.Scene();

  camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

  renderer=new THREE.WebGLRenderer();
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);

  let light=new THREE.DirectionalLight(0xffffff,1.2);
  light.position.set(5,10,7);
  scene.add(light);

  let ground=new THREE.Mesh(
    new THREE.PlaneGeometry(60,60),
    new THREE.MeshStandardMaterial({color:0x2ecc71})
  );
  ground.rotation.x=-Math.PI/2;
  scene.add(ground);

  for(let i=0;i<30;i++){
    let x=(Math.random()-0.5)*50;
    let z=(Math.random()-0.5)*50;
    if(Math.abs(x)<6 && Math.abs(z)<6) continue;
    tree(x,z);
  }

  player=human(0x00ff00);
  enemy=human(0xff0000);
  enemy.position.set(5,0,0);

  bossMaterial = enemy.userData.material;

  scene.add(player);
  scene.add(enemy);

  let blade=new THREE.Mesh(
    new THREE.BoxGeometry(0.2,2,0.2),
    new THREE.MeshStandardMaterial({color:0xffff00,emissive:0xffff00})
  );
  blade.position.y=1;

  sword=new THREE.Group();
  sword.add(blade);
  sword.position.set(0.8,1.5,0);
  player.add(sword);

  document.addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()]=true;

    if(e.code==="Space" && !attacking && stamina>=1){
      attacking=true; attackT=0; hitDone=false; stamina-=1;
    }

    if(e.key==="m" && stamina>0.2 && gunCooldown<=0){
      if(gunTimer<=0){ gunTimer=120; gunHeat=0; }
      gunHeat++;
      if(gunHeat>6){
        hp-=2; shake=0.8; spark(player.position);
        gunHeat=0; gunTimer=0; gunCooldown=50; return;
      }
      shoot(); stamina-=0.2; gunCooldown=10;
    }

    if(e.key==="q" && stamina>=2 && dodgeCD<=0){
      dodge=true; dodgeT=0; stamina-=2; dodgeCD=60;
    }

    if(e.key==="r" && dead) location.reload();
  });

  document.addEventListener("keyup",e=>{
    keys[e.key.toLowerCase()]=false;
  });

  animate();
}

function ui(){
  hp=Math.max(0,hp);
  document.getElementById("hp").style.width=(hp/5*100)+"%";
  document.getElementById("boss").style.width=(bossHP/10*100)+"%";
  document.getElementById("stam").style.width=(stamina/maxStamina*100)+"%";
}

function show(t){
  let m=document.getElementById("msg");
  m.innerText=t+" (R)";
  m.style.display="block";
  dead=true;
}

function animate(){
  requestAnimationFrame(animate);

  gunTimer--;
  if(gunTimer<=0) gunHeat=0;

  dashCooldown--;

  let move=new THREE.Vector3();

  if(keys["w"]) move.z-=1;
  if(keys["s"]) move.z+=1;
  if(keys["a"]) move.x-=1;
  if(keys["d"]) move.x+=1;

  const playerSpeed = 0.1;

  if(move.length()>0){
    move.normalize();
    player.position.add(move.multiplyScalar(playerSpeed));
  }

  const limit=29;
  player.position.x=Math.max(-limit,Math.min(limit,player.position.x));
  player.position.z=Math.max(-limit,Math.min(limit,player.position.z));

  if(dodge){
    dodgeT++;
    if(move.length()>0){
      player.position.add(move.clone().normalize().multiplyScalar(0.4));
    }
    if(dodgeT>20) dodge=false;
  }

  let mid=new THREE.Vector3().addVectors(player.position,enemy.position).multiplyScalar(0.5);
  camera.position.lerp(new THREE.Vector3(mid.x,5,mid.z+12),0.1);
  camera.lookAt(mid);

  applyShake();

  let dist=player.position.distanceTo(enemy.position);
  let dir=new THREE.Vector3().subVectors(enemy.position,player.position).normalize();

  bossTimer--;
  shockTimer--;

  // 🚀 conditional speed
  let bossSpeed;
  if(dist > 20){
    bossSpeed = playerSpeed * 1.5;
  } else {
    bossSpeed = playerSpeed;
  }

  // (rest unchanged...)
  if(dashState===0){
    if(dist>2){
      enemy.position.add(dir.clone().multiplyScalar(-bossSpeed));
    } else if(bossTimer<=0){
      hp -= bossPhase===2 ? 2 : 1;
      bossTimer = bossPhase===2 ? 18 : 40;
    }
  }

  // (rest of code continues exactly same...)
  // truncated here for readability in explanation
