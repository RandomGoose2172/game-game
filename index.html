<!DOCTYPE html>
<html>
<head>
  <title>Balanced Sword + Gun Fight</title>
  <style>
    body { margin:0; overflow:hidden; background:black; }

    #ui {
      position:absolute;
      top:10px; left:10px;
      color:white;
      font-family:Arial;
      z-index:10;
    }

    .bar {
      width:200px; height:20px;
      background:#333;
      margin-bottom:5px;
    }

    .fill { height:100%; background:lime; }
    #boss .fill { background:red; }
    #stam .fill { background:cyan; }

    #msg {
      position:absolute;
      top:40%; width:100%;
      text-align:center;
      font-size:40px;
      color:white;
      display:none;
    }
  </style>
</head>
<body>

<div id="ui">
  HP
  <div class="bar"><div id="hp" class="fill"></div></div>

  STAMINA
  <div class="bar"><div id="stam" class="fill"></div></div>

  BOSS
  <div class="bar"><div id="boss" class="fill"></div></div>
</div>

<div id="msg"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let player, enemy, sword;

let bullets = [];
let keys = {};

let attacking = false;
let attackT = 0;

let stamina = 5;
let maxStamina = 5;

let hp = 5;
let bossHP = 10;

let dodge = false;
let dodgeT = 0;
let dodgeCD = 0;

let gunCooldown = 0;

let bossTimer = 0;
let dead = false;

// 🧍 human with ARMS
function human(color){
  let g = new THREE.Group();
  let m = new THREE.MeshStandardMaterial({color});

  let body = new THREE.Mesh(new THREE.BoxGeometry(0.8,1.5,0.4), m);
  body.position.y = 1.2;
  g.add(body);

  let head = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.6,0.6), m);
  head.position.y = 2.2;
  g.add(head);

  let leg1 = new THREE.Mesh(new THREE.BoxGeometry(0.3,1,0.3), m);
  leg1.position.set(-0.2,0.5,0);
  g.add(leg1);

  let leg2 = new THREE.Mesh(new THREE.BoxGeometry(0.3,1,0.3), m);
  leg2.position.set(0.2,0.5,0);
  g.add(leg2);

  // arms 👇
  let armL = new THREE.Mesh(new THREE.BoxGeometry(0.25,1,0.25), m);
  armL.position.set(-0.6,1.6,0);
  g.add(armL);

  let armR = new THREE.Mesh(new THREE.BoxGeometry(0.25,1,0.25), m);
  armR.position.set(0.6,1.6,0);
  g.add(armR);

  return g;
}

// 🌳 tree
function tree(x,z){
  let t = new THREE.Group();

  let trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.3,0.3,2),
    new THREE.MeshStandardMaterial({color:0x8B4513})
  );
  trunk.position.y = 1;
  t.add(trunk);

  let leaves = new THREE.Mesh(
    new THREE.SphereGeometry(1.3),
    new THREE.MeshStandardMaterial({color:0x2ecc71})
  );
  leaves.position.y = 2.5;
  t.add(leaves);

  t.position.set(x,0,z);
  scene.add(t);
}

// 🔫 bullet
function shoot(){
  let b = new THREE.Mesh(
    new THREE.SphereGeometry(0.1),
    new THREE.MeshBasicMaterial({color:0xff0000})
  );

  b.position.copy(player.position);
  b.position.y += 1.2;

  let dir = new THREE.Vector3().subVectors(enemy.position, player.position);

  // 🎯 slight spread (nerf accuracy)
  dir.x += (Math.random()-0.5)*0.15;
  dir.z += (Math.random()-0.5)*0.15;

  dir.normalize();

  b.userData = {dir};
  bullets.push(b);
  scene.add(b);
}

function init(){
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

  renderer = new THREE.WebGLRenderer();
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);

  let light = new THREE.DirectionalLight(0xffffff,1.2);
  light.position.set(5,10,7);
  scene.add(light);

  // 🌱 ground
  let ground = new THREE.Mesh(
    new THREE.PlaneGeometry(60,60),
    new THREE.MeshStandardMaterial({color:0x2ecc71})
  );
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);

  // 🌳 trees
  for(let i=0;i<30;i++){
    let x=(Math.random()-0.5)*50;
    let z=(Math.random()-0.5)*50;
    if(Math.abs(x)<6 && Math.abs(z)<6) continue;
    tree(x,z);
  }

  player = human(0x00ff00);
  enemy = human(0xff0000);

  enemy.position.set(5,0,0);

  scene.add(player);
  scene.add(enemy);

  // ⚔️ sword
  let blade = new THREE.Mesh(
    new THREE.BoxGeometry(0.2,2,0.2),
    new THREE.MeshStandardMaterial({color:0xffff00, emissive:0xffff00})
  );
  blade.position.y = 1;

  sword = new THREE.Group();
  sword.add(blade);
  sword.position.set(0.8,1.5,0);
  player.add(sword);

  document.addEventListener("keydown", e=>{
    keys[e.key.toLowerCase()] = true;

    if(e.code==="Space" && !attacking && stamina>=1){
      attacking = true;
      attackT = 0;
      stamina -= 1;
    }

    if(e.key==="m" && stamina>0.2 && gunCooldown<=0){
      shoot();
      stamina -= 0.15;
      gunCooldown = 10; // 🔫 nerfed fire rate
    }

    if(e.key==="q" && stamina>=2 && dodgeCD<=0){
      dodge = true;
      dodgeT = 0;
      stamina -= 2;
      dodgeCD = 60;
    }

    if(e.key==="r" && dead) location.reload();
  });

  document.addEventListener("keyup", e=>{
    keys[e.key.toLowerCase()] = false;
  });

  animate();
}

function ui(){
  document.getElementById("hp").style.width = (hp/5*100)+"%";
  document.getElementById("boss").style.width = (bossHP/10*100)+"%";
  document.getElementById("stam").style.width = (stamina/maxStamina*100)+"%";
}

function show(t){
  let m = document.getElementById("msg");
  m.innerText = t + " (R)";
  m.style.display = "block";
  dead = true;
}

function animate(){
  requestAnimationFrame(animate);

  let speed = 0.1;
  let move = new THREE.Vector3();

  if(keys["w"]) move.z -= 1;
  if(keys["s"]) move.z += 1;
  if(keys["a"]) move.x -= 1;
  if(keys["d"]) move.x += 1;

  if(move.length()>0){
    move.normalize();
    player.position.add(move.multiplyScalar(speed));
  }

  // dodge
  dodgeCD--;
  if(dodge){
    dodgeT++;
    player.position.add(move.clone().normalize().multiplyScalar(0.4));
    if(dodgeT>20) dodge=false;
  }

  // camera
  let mid = new THREE.Vector3().addVectors(player.position, enemy.position).multiplyScalar(0.5);
  camera.position.lerp(new THREE.Vector3(mid.x,5,mid.z+12),0.1);
  camera.lookAt(mid);

  let dist = player.position.distanceTo(enemy.position);
  let dir = new THREE.Vector3().subVectors(enemy.position, player.position).normalize();

  // boss AI
  bossTimer--;
  if(dist>2){
    enemy.position.add(dir.clone().multiplyScalar(-0.04));
  } else if(bossTimer<=0){
    hp--;
    bossTimer = 40;
  }

  // ⚔️ sword
  if(attacking){
    attackT++;
    sword.rotation.z = -Math.PI/2 + (attackT/20)*Math.PI;

    if(attackT===10 && dist<2){
      bossHP--;
    }

    if(attackT>20){
      attacking=false;
      sword.rotation.z=0;
    }
  }

  // 🔫 bullets
  for(let i=bullets.length-1;i>=0;i--){
    let b = bullets[i];

    b.position.add(b.userData.dir.clone().multiplyScalar(0.6));

    let dx = b.position.x - enemy.position.x;
    let dz = b.position.z - enemy.position.z;
    let d = Math.sqrt(dx*dx + dz*dz);

    if(d<1.6){
      bossHP -= 0.5;
      scene.remove(b);
      bullets.splice(i,1);
      continue;
    }

    if(b.position.distanceTo(player.position)>60){
      scene.remove(b);
      bullets.splice(i,1);
    }
  }

  // stamina regen
  if(!attacking && !dodge){
    stamina = Math.min(maxStamina, stamina + 0.02);
  }

  gunCooldown--;

  ui();

  if(bossHP<=0 && !dead) show("YOU WIN");
  if(hp<=0 && !dead) show("GAME OVER");

  renderer.render(scene,camera);
}

init();
</script>
</body>
</html>
