<!DOCTYPE html>
<html>
<head>
  <title>Offline Boss Fight</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: Arial;
      z-index: 10;
    }

    .bar {
      width: 200px;
      height: 20px;
      background: #333;
      margin-bottom: 10px;
    }

    .fill {
      height: 100%;
      background: lime;
      width: 100%;
    }

    #enemyBar .fill { background: red; }

    #msg {
      position: absolute;
      top: 40%;
      width: 100%;
      text-align: center;
      font-size: 40px;
      color: white;
      display: none;
      font-family: Arial;
    }
  </style>
</head>
<body>

<div id="ui">
  Player
  <div class="bar"><div id="hp" class="fill"></div></div>
  Boss
  <div class="bar"><div id="ehp" class="fill"></div></div>
</div>

<div id="msg"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let player, enemy, sword;

let keys = {};
let attack = false;
let t = 0;

let hp = 5;
let ehp = 10;
let dead = false;

let swordBox = new THREE.Box3();
let enemyBox = new THREE.Box3();

function createHuman(color){
  let g = new THREE.Group();
  let mat = new THREE.MeshStandardMaterial({ color });

  let head = new THREE.Mesh(new THREE.SphereGeometry(0.3), mat);
  head.position.y = 2;
  g.add(head);

  let body = new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.2,1.5), mat);
  body.position.y = 1;
  g.add(body);

  let arm1 = new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,1), mat);
  arm1.position.set(-0.6,1.2,0);
  g.add(arm1);

  let arm2 = new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,1), mat);
  arm2.position.set(0.6,1.2,0);
  g.add(arm2);

  return g;
}

function init(){
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
  camera.position.set(0,5,10);

  renderer = new THREE.WebGLRenderer();
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);

  let light = new THREE.DirectionalLight(0xffffff,1);
  light.position.set(5,10,7);
  scene.add(light);

  // 🌱 ground
  let ground = new THREE.Mesh(
    new THREE.PlaneGeometry(50,50),
    new THREE.MeshStandardMaterial({color:0x228B22})
  );
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);

  // 🧍 player + boss (NO LOADING)
  player = createHuman(0x00ff00);
  enemy = createHuman(0xff0000);

  enemy.position.set(5,0,0);

  scene.add(player);
  scene.add(enemy);

  // ⚔️ sword
  let blade = new THREE.Mesh(
    new THREE.BoxGeometry(0.1,1.5,0.2),
    new THREE.MeshStandardMaterial({color:0xcccccc})
  );
  blade.position.y = 1;

  sword = new THREE.Group();
  sword.add(blade);

  document.addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()] = true;

    if(e.code==="Space" && !attack && !dead){
      attack = true;
      t = 0;
    }

    if(e.key.toLowerCase()==="r" && dead){
      location.reload();
    }
  });

  document.addEventListener("keyup",e=>{
    keys[e.key.toLowerCase()] = false;
  });

  animate();
}

function ui(){
  document.getElementById("hp").style.width = (hp/5*100)+"%";
  document.getElementById("ehp").style.width = (ehp/10*100)+"%";
}

function msg(t){
  let m = document.getElementById("msg");
  m.innerText = t + " (R to restart)";
  m.style.display = "block";
  dead = true;
}

function animate(){
  requestAnimationFrame(animate);

  let speed = 0.1;

  if(!dead){
    if(keys["w"]) player.position.z -= speed;
    if(keys["s"]) player.position.z += speed;
    if(keys["a"]) player.position.x -= speed;
    if(keys["d"]) player.position.x += speed;
  }

  // camera follow
  let mid = new THREE.Vector3().addVectors(player.position, enemy.position).multiplyScalar(0.5);
  camera.position.lerp(new THREE.Vector3(mid.x,5,mid.z+10),0.08);
  camera.lookAt(mid);

  // enemy follow
  let dir = new THREE.Vector3().subVectors(player.position, enemy.position);
  let dist = dir.length();
  dir.normalize();

  if(!dead){
    if(dist > 2){
      enemy.position.add(dir.clone().multiplyScalar(0.03));
    }
  }

  // attack
  if(attack){
    t += 0.1;
    sword.rotation.z = -Math.PI/2 + t*Math.PI;
    player.add(sword);

    swordBox.setFromObject(sword);
    enemyBox.setFromObject(enemy);

    if(ehp > 0 && swordBox.intersectsBox(enemyBox)){
      ehp--;
      enemy.position.add(dir.clone().multiplyScalar(0.5));
    }

    if(t > 1){
      attack = false;
      sword.rotation.z = 0;
    }
  }

  ui();

  if(ehp <= 0 && !dead) msg("YOU WIN");
  if(hp <= 0 && !dead) msg("GAME OVER");

  renderer.render(scene,camera);
}

init();
</script>

</body>
</html>
