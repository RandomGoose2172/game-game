<!DOCTYPE html>
<html>
<head>
  <title>Ultimate Boss Fight</title>
  <style>
    body { margin:0; overflow:hidden; background:black; }
    #ui { position:absolute; top:10px; left:10px; color:white; font-family:Arial; z-index:10; }
    .bar { width:200px; height:20px; background:#333; margin-bottom:5px; }
    .fill { height:100%; background:lime; }
    #boss .fill { background:red; }
    #stam .fill { background:cyan; }
    #msg { position:absolute; top:40%; width:100%; text-align:center; font-size:40px; color:white; display:none; }
  </style>
</head>
<body>

<div id="ui">
  HP <div class="bar"><div id="hp" class="fill"></div></div>
  STAMINA <div class="bar"><div id="stam" class="fill"></div></div>
  BOSS <div class="bar"><div id="boss" class="fill"></div></div>
</div>

<div id="msg"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let player, enemy, sword, shieldMesh;

let bullets = [];
let enemyProjectiles = [];

let keys = {};
let shielding = false;
let parryWindow = 0;

let stamina=5, maxStamina=5;
let hp=5, bossHP=10;

let attacking=false, attackT=0, hitDone=false;

let bossPhase=1, bossArms=[];
let shootTimer=0;

let dead=false;
let shake=0;

// ===== effects =====
function spark(pos){
  let s=new THREE.Mesh(
    new THREE.SphereGeometry(0.1),
    new THREE.MeshBasicMaterial({color:0xffff00})
  );
  s.position.copy(pos);
  scene.add(s);
  setTimeout(()=>scene.remove(s),100);
}

// ===== character =====
function makeHuman(color){
  let g=new THREE.Group();
  let mat=new THREE.MeshStandardMaterial({color});
  let limb=new THREE.MeshStandardMaterial({color:0x222222});

  let body=new THREE.Mesh(new THREE.BoxGeometry(0.8,1.5,0.4),mat);
  body.position.y=1.2; g.add(body);

  let head=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.6,0.6),mat);
  head.position.y=2.2; g.add(head);

  let leg1=new THREE.Mesh(new THREE.BoxGeometry(0.3,1,0.3),limb);
  leg1.position.set(-0.2,0.5,0); g.add(leg1);

  let leg2=new THREE.Mesh(new THREE.BoxGeometry(0.3,1,0.3),limb);
  leg2.position.set(0.2,0.5,0); g.add(leg2);

  let arm1=new THREE.Mesh(new THREE.BoxGeometry(0.25,1,0.25),limb);
  arm1.position.set(-0.6,1.6,0); g.add(arm1);

  let arm2=new THREE.Mesh(new THREE.BoxGeometry(0.25,1,0.25),limb);
  arm2.position.set(0.6,1.6,0); g.add(arm2);

  return g;
}

// ===== shoot =====
function shoot(){
  let b=new THREE.Mesh(
    new THREE.SphereGeometry(0.1),
    new THREE.MeshBasicMaterial({color:0xff0000})
  );

  b.position.copy(player.position);
  b.position.y+=1.2;

  let dir=new THREE.Vector3().subVectors(enemy.position,player.position).normalize();
  b.userData={dir};

  bullets.push(b);
  scene.add(b);
}

// ===== cube =====
function shootCube(){
  let c=new THREE.Mesh(
    new THREE.BoxGeometry(0.4,0.4,0.4),
    new THREE.MeshBasicMaterial({color:0xff2222})
  );

  c.position.copy(enemy.position);
  c.position.y+=1.2;

  let dir=new THREE.Vector3().subVectors(player.position,enemy.position).normalize();
  c.userData={dir, life:120, reflected:false};

  enemyProjectiles.push(c);
  scene.add(c);
}

// ===== init =====
function init(){
  scene=new THREE.Scene();

  camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

  renderer=new THREE.WebGLRenderer();
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);

  let light=new THREE.DirectionalLight(0xffffff,1.2);
  light.position.set(5,10,7);
  scene.add(light);

  let ground=new THREE.Mesh(
    new THREE.PlaneGeometry(60,60),
    new THREE.MeshStandardMaterial({color:0x2ecc71})
  );
  ground.rotation.x=-Math.PI/2;
  scene.add(ground);

  // trees
  for(let i=0;i<30;i++){
    let t=new THREE.Group();

    let trunk=new THREE.Mesh(
      new THREE.CylinderGeometry(0.3,0.3,2),
      new THREE.MeshStandardMaterial({color:0x8B4513})
    );
    trunk.position.y=1;
    t.add(trunk);

    let leaves=new THREE.Mesh(
      new THREE.SphereGeometry(1.3),
      new THREE.MeshStandardMaterial({color:0x2ecc71})
    );
    leaves.position.y=2.5;
    t.add(leaves);

    t.position.set((Math.random()-0.5)*50,0,(Math.random()-0.5)*50);
    scene.add(t);
  }

  player=makeHuman(0x00ff00);
  enemy=makeHuman(0xff0000);
  enemy.position.set(5,0,0);

  scene.add(player);
  scene.add(enemy);

  // sword
  let blade=new THREE.Mesh(
    new THREE.BoxGeometry(0.2,2,0.2),
    new THREE.MeshStandardMaterial({color:0xffff00, emissive:0xffff00})
  );
  blade.position.y=1;

  sword=new THREE.Group();
  sword.add(blade);
  sword.position.set(0.8,1.5,0);
  player.add(sword);

  // shield
  shieldMesh=new THREE.Mesh(
    new THREE.SphereGeometry(1.2,16,16),
    new THREE.MeshBasicMaterial({color:0x00ffff, wireframe:true})
  );
  shieldMesh.visible=false;
  player.add(shieldMesh);

  document.addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()]=true;

    if(e.code==="ShiftLeft"){
      shielding=true;
      parryWindow=10;
    }

    if(e.code==="Space" && stamina>=1){
      attacking=true; attackT=0; hitDone=false; stamina-=1;
    }

    if(e.key==="m" && stamina>0.2){
      shoot(); stamina-=0.2;
    }

    if(e.key==="r" && dead) location.reload();
  });

  document.addEventListener("keyup",e=>{
    keys[e.key.toLowerCase()]=false;
    if(e.code==="ShiftLeft") shielding=false;
  });

  animate();
}

// ===== UI =====
function ui(){
  document.getElementById("hp").style.width=(hp/5*100)+"%";
  document.getElementById("boss").style.width=(bossHP/10*100)+"%";
  document.getElementById("stam").style.width=(stamina/maxStamina*100)+"%";
}

function show(t){
  let m=document.getElementById("msg");
  m.innerText=t+" (R)";
  m.style.display="block";
  dead=true;
}

// ===== main loop =====
function animate(){
  requestAnimationFrame(animate);

  if(dead) return;

  if(parryWindow>0) parryWindow--;

  // movement
  let move=new THREE.Vector3();
  if(keys["w"]) move.z-=1;
  if(keys["s"]) move.z+=1;
  if(keys["a"]) move.x-=1;
  if(keys["d"]) move.x+=1;

  if(move.length()>0){
    move.normalize();
    player.position.add(move.multiplyScalar(0.1));
  }

  player.position.x=Math.max(-29,Math.min(29,player.position.x));
  player.position.z=Math.max(-29,Math.min(29,player.position.z));

  // shield
  shieldMesh.visible=shielding && stamina>0;
  if(shielding) stamina-=0.03;

  // boss basic move
  let dir=new THREE.Vector3().subVectors(enemy.position,player.position).normalize();
  enemy.position.add(dir.multiplyScalar(-0.05));

  // shoot cubes
  shootTimer--;
  if(shootTimer<=0){
    shootCube();
    shootTimer = bossPhase===2 ? 40 : 70;
  }

  // cubes
  for(let i=enemyProjectiles.length-1;i>=0;i--){
    let p=enemyProjectiles[i];

    if(bossPhase===2 && p.userData.life>60){
      let home=new THREE.Vector3().subVectors(player.position,p.position).normalize();
      p.userData.dir.lerp(home,0.05);
    }

    p.userData.life--;
    p.position.add(p.userData.dir.clone().multiplyScalar(0.15));

    // reflect hit boss
    if(p.userData.reflected && p.position.distanceTo(enemy.position)<1.6){
      bossHP-=2;
      spark(enemy.position);
      scene.remove(p);
      enemyProjectiles.splice(i,1);
      continue;
    }

    // hit player
    if(p.position.distanceTo(player.position)<1.6){

      if(parryWindow>0){
        let reflect=new THREE.Vector3().subVectors(enemy.position,p.position).normalize();
        p.userData.dir.copy(reflect);
        p.userData.reflected=true;
        p.material.color.set(0x00ffff);
        spark(player.position);
        continue;
      }

      if(shielding){
        scene.remove(p);
        enemyProjectiles.splice(i,1);
        continue;
      }

      hp-=1.5;
      spark(player.position);
      scene.remove(p);
      enemyProjectiles.splice(i,1);
    }
  }

  // bullets
  for(let i=bullets.length-1;i>=0;i--){
    let b=bullets[i];
    b.position.add(b.userData.dir.clone().multiplyScalar(0.6));

    if(b.position.distanceTo(enemy.position)<1.6){
      bossHP-=0.5;
      scene.remove(b);
      bullets.splice(i,1);
    }
  }

  // sword
  if(attacking){
    attackT++;
    sword.rotation.z=-Math.PI/2+(attackT/20)*Math.PI;

    if(!hitDone && attackT>5 && attackT<15 && player.position.distanceTo(enemy.position)<3){
      bossHP-=1.5;
      hitDone=true;
    }

    if(attackT>20){
      attacking=false;
      sword.rotation.z=0;
    }
  }

  if(!shielding && !attacking){
    stamina=Math.min(maxStamina, stamina+0.02);
  }

  // camera
  let mid=new THREE.Vector3().addVectors(player.position,enemy.position).multiplyScalar(0.5);
  camera.position.lerp(new THREE.Vector3(mid.x,5,mid.z+12),0.1);
  camera.lookAt(mid);

  ui();

  if(hp<=0) show("GAME OVER");
  if(bossHP<=5 && bossPhase===1) bossPhase=2;
  if(bossHP<=0) show("YOU WIN");

  renderer.render(scene,camera);
}

init();
</script>
</body>
</html>
